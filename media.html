<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LINE Media Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Barlow+Condensed:wght@600;700&display=swap');

    :root {
      --bg0: #061320;
      --bg1: #173247;
      --card: rgba(8, 21, 35, 0.84);
      --line: rgba(155, 220, 255, 0.25);
      --txt: #e7f6ff;
      --sub: #a6cadf;
      --ok: #69edbf;
      --accent: #57d8ff;
      --radius: 16px;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--txt);
      font-family: "Zen Kaku Gothic New", sans-serif;
      background:
        radial-gradient(900px 500px at -20% -10%, #215f84 0%, transparent 60%),
        radial-gradient(900px 500px at 120% 0%, #185273 0%, transparent 55%),
        linear-gradient(145deg, var(--bg0), var(--bg1));
      padding: 20px;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero, .card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 18px 20px;
      background: linear-gradient(160deg, rgba(87, 216, 255, 0.15), rgba(8, 21, 35, 0.65));
    }

    .hero h1 {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-size: clamp(2rem, 3.2vw, 2.8rem);
      line-height: 0.95;
    }

    .hero p {
      margin: 10px 0 0;
      color: var(--sub);
    }

    .status {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(8, 21, 35, 0.6);
    }

    .pill.ok {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 55%, transparent);
    }

    .card {
      background: var(--card);
      padding: 16px;
    }

    .controls {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      align-items: center;
    }

    .input, .select, .button {
      min-height: 39px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: rgba(8, 21, 35, 0.6);
      color: var(--txt);
      padding: 0 11px;
      font: inherit;
    }

    .input::placeholder { color: #83abc2; }

    .button {
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .button.primary {
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
      background: linear-gradient(180deg, rgba(87, 216, 255, 0.32), rgba(10, 116, 158, 0.32));
    }

    .button.danger {
      border-color: rgba(255, 124, 159, 0.55);
      color: #ffbdd0;
      background: rgba(80, 10, 28, 0.4);
    }

    .button.link {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .meta {
      margin-top: 8px;
      color: var(--sub);
      font-size: 0.87rem;
    }

    .usage-wrap {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(155, 220, 255, 0.22);
      border-radius: 12px;
      background: rgba(5, 17, 28, 0.55);
    }

    .usage-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.84rem;
      color: #d7eeff;
      margin-bottom: 8px;
    }

    .usage-track {
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(155, 220, 255, 0.3);
      background: rgba(2, 10, 18, 0.72);
      overflow: hidden;
    }

    .usage-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #40d8ff, #55efc0);
      transition: width 220ms ease;
    }

    .usage-fill.warn {
      background: linear-gradient(90deg, #ffc062, #ff8e54);
    }

    .usage-fill.full {
      background: linear-gradient(90deg, #ff7c9f, #ff5f78);
    }

    .usage-scale {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      color: #8fbad2;
      font-size: 0.77rem;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .item {
      border: 1px solid rgba(155, 220, 255, 0.22);
      border-radius: 12px;
      background: rgba(5, 17, 28, 0.65);
      overflow: hidden;
    }

    .preview {
      min-height: 160px;
      max-height: 260px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.26);
      border-bottom: 1px solid rgba(155, 220, 255, 0.14);
    }

    .preview img,
    .preview video {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
      background: rgba(0, 0, 0, 0.18);
    }

    .preview audio {
      width: calc(100% - 18px);
      margin: 10px;
    }

    .preview .empty {
      color: #8bb5ce;
      font-size: 0.86rem;
      padding: 18px;
      text-align: center;
    }

    .item-body {
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 3px 9px;
      font-size: 0.72rem;
      color: #9be8ff;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      width: fit-content;
    }

    .item-line {
      font-size: 0.84rem;
      color: #d8efff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-line.sub {
      color: #93bdd5;
    }

    .item-line a {
      color: #8de3ff;
      text-decoration: underline;
    }

    .item-actions {
      margin-top: 4px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item-actions .button {
      min-height: 30px;
      font-size: 0.76rem;
      padding: 0 10px;
    }

    .pager {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      body { padding: 12px; }
      .list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>LINE Media Viewer</h1>
      <p>LINEの添付ファイル（画像/動画/音声/ファイル）を表示します。</p>
      <div class="status">
        <span id="authState" class="pill">未接続</span>
        <span id="lastRefresh" class="pill">最終更新: なし</span>
      </div>
    </header>

    <section class="card">
      <h2>接続</h2>
      <div class="controls">
        <input id="projectUrlInput" class="input" style="min-width:320px" type="text" readonly tabindex="-1" aria-readonly="true">
        <input id="tokenInput" class="input" type="password" placeholder="ADMIN_DASHBOARD_TOKEN">
        <button id="saveTokenBtn" class="button primary">保存して接続</button>
        <button id="clearTokenBtn" class="button">削除</button>
        <a class="button link" href="./index.html">管理画面に戻る</a>
      </div>
      <div class="meta">署名付きURLは一定時間で期限切れになります。見えなくなった場合は再読み込みしてください。</div>
    </section>

    <section class="card">
      <h2>メディア一覧</h2>
      <div class="controls">
        <select id="typeFilter" class="select" aria-label="メディア種別">
          <option value="">全種別</option>
          <option value="image">画像</option>
          <option value="video">動画</option>
          <option value="audio">音声</option>
          <option value="file">ファイル</option>
        </select>
        <input id="roomFilter" class="input" type="text" placeholder="room_id で絞り込み">
        <select id="limitSelect" class="select" aria-label="表示件数">
          <option value="12">12件</option>
          <option value="24" selected>24件</option>
          <option value="48">48件</option>
        </select>
        <button id="applyFilterBtn" class="button primary">表示</button>
        <button id="reloadBtn" class="button">再読み込み</button>
      </div>
      <div class="controls" style="margin-top:8px;">
        <span class="meta" style="margin:0;">アップロード上限（MB未満）</span>
        <input id="mediaUploadMaxMbInput" class="input" type="number" min="1" max="20" step="1" placeholder="10">
        <button id="saveMediaUploadLimitBtn" class="button primary">上限を保存</button>
        <span id="mediaUploadLimitMeta" class="meta" style="margin:0;"></span>
      </div>
      <div id="summary" class="meta">未取得</div>
      <div id="usageWrap" class="usage-wrap">
        <div class="usage-head">
          <span>メディア容量使用率</span>
          <span id="usageText">0 MB / 500 MB (0%)</span>
        </div>
        <div class="usage-track">
          <div id="usageFill" class="usage-fill"></div>
        </div>
        <div class="usage-scale">
          <span>0 MB</span>
          <span id="usageCapLabel">500 MB</span>
        </div>
      </div>
      <div id="mediaList" class="list"></div>
      <div class="pager">
        <button id="prevBtn" class="button">前へ</button>
        <button id="nextBtn" class="button">次へ</button>
      </div>
    </section>
  </div>

  <script>
    const STORE_TOKEN_KEY = 'line_summary_admin_token';
    const FIXED_PROJECT_URL = 'https://jhpmzqxqvapdkyvvhyra.supabase.co';

    const state = {
      offset: 0,
      limit: 24,
      total: 0,
      hasMore: false,
    };

    const dom = {
      authState: document.getElementById('authState'),
      lastRefresh: document.getElementById('lastRefresh'),
      projectUrlInput: document.getElementById('projectUrlInput'),
      tokenInput: document.getElementById('tokenInput'),
      saveTokenBtn: document.getElementById('saveTokenBtn'),
      clearTokenBtn: document.getElementById('clearTokenBtn'),
      typeFilter: document.getElementById('typeFilter'),
      roomFilter: document.getElementById('roomFilter'),
      limitSelect: document.getElementById('limitSelect'),
      applyFilterBtn: document.getElementById('applyFilterBtn'),
      reloadBtn: document.getElementById('reloadBtn'),
      mediaUploadMaxMbInput: document.getElementById('mediaUploadMaxMbInput'),
      saveMediaUploadLimitBtn: document.getElementById('saveMediaUploadLimitBtn'),
      mediaUploadLimitMeta: document.getElementById('mediaUploadLimitMeta'),
      summary: document.getElementById('summary'),
      usageWrap: document.getElementById('usageWrap'),
      usageText: document.getElementById('usageText'),
      usageFill: document.getElementById('usageFill'),
      usageCapLabel: document.getElementById('usageCapLabel'),
      mediaList: document.getElementById('mediaList'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
    };
    const MEDIA_CAP_DEFAULT_BYTES = 500 * 1024 * 1024;

    function getToken() {
      return localStorage.getItem(STORE_TOKEN_KEY) || '';
    }

    function setToken(value) {
      if (value) localStorage.setItem(STORE_TOKEN_KEY, value);
      else localStorage.removeItem(STORE_TOKEN_KEY);
      updateAuthState();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('ja-JP', { hour12: false });
    }

    function formatBytes(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n < 0) return '-';
      if (n < 1024) return Math.floor(n) + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      if (n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(2) + ' MB';
      return (n / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function updateAuthState() {
      const hasToken = !!getToken();
      dom.authState.textContent = hasToken ? '接続準備OK' : '未接続';
      dom.authState.className = hasToken ? 'pill ok' : 'pill';
    }

    async function api(path, options) {
      const token = getToken();
      if (!token) throw new Error('先に管理トークンを保存してください。');
      const req = options || {};
      const url = FIXED_PROJECT_URL.replace(/\/+$/, '') + '/functions/v1/admin-api' + path;
      const res = await fetch(url, {
        method: req.method || 'GET',
        headers: {
          'x-admin-token': token,
          'Content-Type': 'application/json',
          ...(req.headers || {}),
        },
        body: req.body,
        cache: 'no-store',
      });
      const text = await res.text();
      let body = {};
      try {
        body = text ? JSON.parse(text) : {};
      } catch (_) {
        body = { raw: text };
      }
      if (!res.ok) {
        throw new Error(body.error || ('API error: ' + res.status));
      }
      return body;
    }

    function buildQuery() {
      const params = new URLSearchParams();
      params.set('limit', String(state.limit));
      params.set('offset', String(state.offset));
      const type = String(dom.typeFilter.value || '').trim();
      const roomId = String(dom.roomFilter.value || '').trim();
      if (type) params.set('media_type', type);
      if (roomId) params.set('room_id', roomId);
      params.set('_ts', String(Date.now()));
      return '/media?' + params.toString();
    }

    function renderMediaItem(item) {
      const type = String(item.media_type || 'file');
      const signedUrl = String(item.signed_url || '');
      const name = item.original_file_name ? String(item.original_file_name) : '(名称なし)';
      const mime = item.mime_type ? String(item.mime_type) : '-';

      let preview = '<div class="empty">プレビュー不可</div>';
      if (!signedUrl) {
        preview = '<div class="empty">URL生成失敗（再読み込みしてください）</div>';
      } else if (type === 'image') {
        preview = '<a href="' + escapeHtml(signedUrl) + '" target="_blank" rel="noopener noreferrer"><img loading="lazy" src="' + escapeHtml(signedUrl) + '" alt="image"></a>';
      } else if (type === 'video') {
        preview = '<video controls preload="metadata" src="' + escapeHtml(signedUrl) + '"></video>';
      } else if (type === 'audio') {
        preview = '<audio controls preload="metadata" src="' + escapeHtml(signedUrl) + '"></audio>';
      } else {
        preview = '<div class="empty"><a href="' + escapeHtml(signedUrl) + '" target="_blank" rel="noopener noreferrer">ダウンロード</a></div>';
      }

      return [
        '<article class="item">',
        '<div class="preview">', preview, '</div>',
        '<div class="item-body">',
        '<span class="tag">' + escapeHtml(type) + '</span>',
        '<div class="item-line" title="' + escapeHtml(name) + '">' + escapeHtml(name) + '</div>',
        '<div class="item-line sub" title="ルーム: ' + escapeHtml(item.room_name || '（未設定）') + '">ルーム: ' + escapeHtml(item.room_name || '（未設定）') + '</div>',
        '<div class="item-line sub">日時: ' + escapeHtml(formatDate(item.created_at)) + '</div>',
        '<div class="item-line sub">サイズ: ' + escapeHtml(formatBytes(item.file_size_bytes)) + '</div>',
        '<div class="item-line sub" title="' + escapeHtml(mime) + '">MIME: ' + escapeHtml(mime) + '</div>',
        '<div class="item-line sub" title="' + escapeHtml(String(item.line_message_tag || '')) + '">タグ: ' + escapeHtml(String(item.line_message_tag || '-')) + '</div>',
        '<div class="item-actions"><button class="button danger media-delete-btn" type="button" data-media-id="' + escapeHtml(String(item.id || '')) + '">削除</button></div>',
        '</div>',
        '</article>',
      ].join('');
    }

    function updatePager() {
      dom.prevBtn.disabled = state.offset <= 0;
      dom.nextBtn.disabled = !state.hasMore;
    }

    function renderUsageBar(totalBytes, capBytes) {
      const cap = Number.isFinite(Number(capBytes)) && Number(capBytes) > 0
        ? Number(capBytes)
        : MEDIA_CAP_DEFAULT_BYTES;
      const used = Number.isFinite(Number(totalBytes)) && Number(totalBytes) > 0
        ? Number(totalBytes)
        : 0;
      const ratioRaw = cap > 0 ? (used / cap) : 0;
      const ratio = Math.max(0, Math.min(1, ratioRaw));
      const percent = Math.round(ratioRaw * 1000) / 10;

      dom.usageCapLabel.textContent = formatBytes(cap);
      dom.usageText.textContent = formatBytes(used) + ' / ' + formatBytes(cap) + ' (' + percent + '%)';
      dom.usageFill.style.width = (ratio * 100) + '%';
      dom.usageFill.classList.remove('warn', 'full');
      if (ratioRaw >= 1) {
        dom.usageFill.classList.add('full');
      } else if (ratioRaw >= 0.85) {
        dom.usageFill.classList.add('warn');
      }
    }

    async function loadMedia() {
      const result = await api(buildQuery());
      const items = Array.isArray(result.items) ? result.items : [];
      state.total = Number(result.total || 0);
      state.hasMore = !!result.has_more;

      if (items.length === 0) {
        dom.mediaList.innerHTML = '<div class="item"><div class="preview"><div class="empty">該当データなし</div></div></div>';
      } else {
        dom.mediaList.innerHTML = items.map(renderMediaItem).join('');
      }

      const from = state.total === 0 ? 0 : state.offset + 1;
      const to = Math.min(state.offset + items.length, state.total);
      const filteredTotalBytes = Number(result.total_file_bytes || 0);
      const filteredTotalCount = Number(result.total_file_count || state.total || 0);
      const allTotalBytes = Number(result.all_file_bytes || filteredTotalBytes || 0);
      const allTotalCount = Number(result.all_file_count || filteredTotalCount || 0);
      const capBytes = Number(result.media_storage_cap_bytes || MEDIA_CAP_DEFAULT_BYTES);
      const uploadLimitMb = Number(result.media_upload_max_mb || 10);
      const uploadLimitMbSafe = Number.isInteger(uploadLimitMb) ? uploadLimitMb : 10;
      dom.mediaUploadMaxMbInput.value = String(uploadLimitMbSafe);
      dom.mediaUploadLimitMeta.textContent = '現在: ' + uploadLimitMbSafe + 'MB未満';
      const hasFilter = String(dom.typeFilter.value || '').trim() || String(dom.roomFilter.value || '').trim();
      dom.summary.textContent =
        '表示: ' + from + '-' + to + ' / 全' + state.total + '件'
        + ' | この条件の合計: ' + formatBytes(filteredTotalBytes) + '（' + filteredTotalCount + '件）'
        + (hasFilter ? (' | 全体合計: ' + formatBytes(allTotalBytes) + '（' + allTotalCount + '件）') : '')
        + ' | アップロード上限: ' + uploadLimitMbSafe + 'MB未満';
      renderUsageBar(allTotalBytes, capBytes);
      dom.lastRefresh.textContent = '最終更新: ' + formatDate(result.generated_at || new Date().toISOString());
      updatePager();
    }

    async function loadFirstPage() {
      state.offset = 0;
      state.limit = Number(dom.limitSelect.value || 24);
      await loadMedia();
    }

    async function deleteMediaItem(mediaId) {
      const id = Number(mediaId);
      if (!Number.isInteger(id) || id <= 0) throw new Error('削除対象のIDが不正です。');
      const ok = window.confirm('このメディアを削除します。よろしいですか？');
      if (!ok) return;
      await api('/media/' + encodeURIComponent(String(id)), { method: 'DELETE' });
      await loadMedia();
      if (state.total > 0 && state.offset >= state.total && state.offset > 0) {
        state.offset = Math.max(0, state.offset - state.limit);
        await loadMedia();
      }
    }

    async function saveMediaUploadLimit() {
      const mb = Number(dom.mediaUploadMaxMbInput.value || 0);
      if (!Number.isInteger(mb) || mb < 1 || mb > 20) {
        throw new Error('アップロード上限は 1〜20 MB の整数で入力してください。');
      }
      await api('/settings/media-upload-limit', {
        method: 'PUT',
        body: JSON.stringify({ media_upload_max_mb: mb }),
      });
      await loadMedia();
      alert('メディアアップロード上限を保存しました。');
    }

    dom.saveTokenBtn.addEventListener('click', async function() {
      setToken(String(dom.tokenInput.value || '').trim());
      dom.tokenInput.value = '';
      try {
        await loadFirstPage();
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    dom.clearTokenBtn.addEventListener('click', function() {
      setToken('');
      dom.mediaList.innerHTML = '';
      dom.summary.textContent = '未取得';
      dom.mediaUploadLimitMeta.textContent = '';
      renderUsageBar(0, MEDIA_CAP_DEFAULT_BYTES);
      dom.lastRefresh.textContent = '最終更新: なし';
      updatePager();
    });

    dom.applyFilterBtn.addEventListener('click', async function() {
      try {
        await loadFirstPage();
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    dom.reloadBtn.addEventListener('click', async function() {
      try {
        await loadMedia();
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    dom.saveMediaUploadLimitBtn.addEventListener('click', async function() {
      try {
        await saveMediaUploadLimit();
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    dom.prevBtn.addEventListener('click', async function() {
      if (state.offset <= 0) return;
      state.offset = Math.max(0, state.offset - state.limit);
      try {
        await loadMedia();
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    dom.nextBtn.addEventListener('click', async function() {
      if (!state.hasMore) return;
      state.offset += state.limit;
      try {
        await loadMedia();
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    dom.mediaList.addEventListener('click', async function(event) {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (!target.classList.contains('media-delete-btn')) return;
      const mediaId = target.getAttribute('data-media-id') || '';
      try {
        await deleteMediaItem(mediaId);
      } catch (error) {
        alert(error.message || String(error));
      }
    });

    (function init() {
      dom.projectUrlInput.value = FIXED_PROJECT_URL;
      updateAuthState();
      updatePager();
      dom.mediaUploadMaxMbInput.value = '10';
      dom.mediaUploadLimitMeta.textContent = '現在: 10MB未満';
      renderUsageBar(0, MEDIA_CAP_DEFAULT_BYTES);
      if (getToken()) {
        loadFirstPage().catch(function(error) {
          alert(error.message || String(error));
        });
      }
    })();
  </script>
</body>
</html>
