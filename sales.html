<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#006c3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="LINE Summary">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <title>LINE Sales Graph</title>
  <style>
    :root {
      --bg0: #061320;
      --bg1: #173247;
      --card: rgba(8, 21, 35, 0.84);
      --line: rgba(155, 220, 255, 0.25);
      --txt: #e7f6ff;
      --sub: #a6cadf;
      --ok: #69edbf;
      --accent: #57d8ff;
      --radius: 16px;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      --sales-gross: #59dcff;
      --sales-net: #6cf0be;
      --sales-tax: #ffd07d;
      --count-receipt: #87a6ff;
      --count-guest: #ff9fbf;
      --count-party: #9de6b6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--txt);
      font-family: "Zen Kaku Gothic New", sans-serif;
      background:
        radial-gradient(900px 500px at -20% -10%, #215f84 0%, transparent 60%),
        radial-gradient(900px 500px at 120% 0%, #185273 0%, transparent 55%),
        linear-gradient(145deg, var(--bg0), var(--bg1));
      padding: 20px;
      transition: background 0.25s ease, color 0.2s ease;
    }

    body[data-theme='light'] {
      --bg0: #f5fbff;
      --bg1: #deedf8;
      --card: rgba(255, 255, 255, 0.9);
      --line: rgba(45, 106, 151, 0.24);
      --txt: #132a3b;
      --sub: #4f7187;
      --ok: #0f8d5f;
      --accent: #157fba;
      --shadow: 0 14px 34px rgba(20, 59, 89, 0.16);
      background:
        radial-gradient(900px 500px at -20% -10%, #d0ebfb 0%, transparent 60%),
        radial-gradient(900px 500px at 120% 0%, #c6e0f3 0%, transparent 55%),
        linear-gradient(145deg, var(--bg0), var(--bg1));
    }

    .app {
      max-width: 1360px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero, .card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 18px 20px;
      background: linear-gradient(160deg, rgba(87, 216, 255, 0.15), rgba(8, 21, 35, 0.65));
    }

    .hero h1 {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-size: clamp(2rem, 3.2vw, 2.8rem);
      line-height: 0.95;
    }

    .hero p {
      margin: 10px 0 0;
      color: var(--sub);
    }

    .status {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--sub);
      font-size: 0.88rem;
      align-items: center;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(8, 21, 35, 0.6);
    }

    button.pill {
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .pill.ok {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 55%, transparent);
    }

    .pill.link {
      color: #9be8ff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .pill.theme-toggle {
      padding-inline: 12px;
    }

    .card {
      background: var(--card);
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.08rem;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(155, 220, 255, 0.18);
    }

    .controls {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      align-items: center;
    }

    .input, .select, .button {
      min-height: 39px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: rgba(8, 21, 35, 0.6);
      color: var(--txt);
      padding: 0 11px;
      font: inherit;
    }

    .button {
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .button.primary {
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
      background: linear-gradient(180deg, rgba(87, 216, 255, 0.32), rgba(10, 116, 158, 0.32));
    }

    .meta {
      margin-top: 8px;
      color: var(--sub);
      font-size: 0.87rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-item {
      border: 1px solid rgba(155, 220, 255, 0.18);
      border-radius: 12px;
      background: rgba(5, 17, 28, 0.5);
      padding: 10px;
      min-height: 86px;
      display: grid;
      align-content: start;
      gap: 6px;
    }

    .summary-item .label {
      font-size: 0.8rem;
      color: #94bfd8;
      letter-spacing: 0.02em;
    }

    .summary-item .value {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #ecf9ff;
      word-break: break-all;
    }

    .chart-block {
      margin-top: 12px;
      border: 1px solid rgba(155, 220, 255, 0.2);
      border-radius: 13px;
      background: rgba(5, 17, 28, 0.55);
      padding: 12px;
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .chart-title {
      margin: 0;
      font-size: 0.96rem;
      color: #d6efff;
      letter-spacing: 0.01em;
    }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #b6d6ea;
    }

    .legend-color {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .chart-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .chart-svg {
      width: 100%;
      min-width: 780px;
      height: 320px;
      display: block;
      border-radius: 12px;
      background: rgba(2, 10, 18, 0.52);
      border: 1px solid rgba(155, 220, 255, 0.13);
    }

    .chart-empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: #8eb4ca;
      font-size: 0.9rem;
      border: 1px dashed rgba(155, 220, 255, 0.22);
      border-radius: 12px;
      background: rgba(2, 10, 18, 0.35);
    }

    body[data-theme='light'] .hero {
      background: linear-gradient(160deg, rgba(98, 189, 239, 0.24), rgba(255, 255, 255, 0.86));
    }

    body[data-theme='light'] .pill {
      background: rgba(255, 255, 255, 0.86);
      color: var(--txt);
    }

    body[data-theme='light'] .input,
    body[data-theme='light'] .select,
    body[data-theme='light'] .button {
      background: rgba(255, 255, 255, 0.92);
      color: var(--txt);
      border-color: rgba(60, 122, 168, 0.28);
    }

    body[data-theme='light'] .button.primary {
      background: linear-gradient(180deg, rgba(32, 157, 217, 0.22), rgba(53, 122, 177, 0.18));
      border-color: rgba(30, 129, 184, 0.44);
    }

    body[data-theme='light'] .summary-item,
    body[data-theme='light'] .chart-block {
      background: rgba(249, 253, 255, 0.95);
      border-color: rgba(76, 128, 164, 0.22);
    }

    body[data-theme='light'] .summary-item .label,
    body[data-theme='light'] .legend-item,
    body[data-theme='light'] .chart-empty {
      color: #547a91;
    }

    body[data-theme='light'] .summary-item .value,
    body[data-theme='light'] .chart-title {
      color: #1f3f57;
    }

    @media (max-width: 1080px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      body { padding: 12px; }
      .summary-grid {
        grid-template-columns: 1fr;
      }
      .chart-svg {
        min-width: 680px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>LINE Sales Graph</h1>
      <p>レシート解析データを店舗別に可視化します。</p>
      <div class="status">
        <span id="authState" class="pill">未接続</span>
        <span id="lastRefresh" class="pill">最終更新: なし</span>
        <a href="./index.html" class="pill link">管理画面</a>
        <a href="./media.html" class="pill link">メディア閲覧</a>
        <a href="./reservation.html" class="pill link">予約表</a>
        <button id="themeToggleBtn" type="button" class="pill theme-toggle" aria-pressed="false">ライトモード</button>
      </div>
    </header>

    <section class="card">
      <h2>接続</h2>
      <div class="controls">
        <input id="projectUrlInput" class="input" style="min-width:320px" type="text" readonly tabindex="-1" aria-readonly="true">
        <input id="tokenInput" class="input" type="password" placeholder="ADMIN_DASHBOARD_TOKEN">
        <button id="saveTokenBtn" class="button primary">保存して接続</button>
        <button id="clearTokenBtn" class="button">削除</button>
      </div>
    </section>

    <section class="card">
      <h2>条件</h2>
      <div class="controls">
        <button id="prevMonthBtn" class="button">前月</button>
        <button id="thisMonthBtn" class="button">今月</button>
        <button id="nextMonthBtn" class="button">翌月</button>
        <select id="storeSelect" class="select" style="min-width:280px" aria-label="店舗選択"></select>
        <button id="reloadBtn" class="button primary">再読み込み</button>
      </div>
      <div id="summaryMeta" class="meta">未取得</div>
    </section>

    <section class="card">
      <h2 id="summaryTitle">店舗集計</h2>
      <div id="summaryGrid" class="summary-grid"></div>

      <div class="chart-block">
        <div class="chart-head">
          <h3 class="chart-title">日次売上推移</h3>
          <div class="chart-legend" id="salesLegend"></div>
        </div>
        <div class="chart-wrap">
          <svg id="salesChart" class="chart-svg" viewBox="0 0 960 320" preserveAspectRatio="none" aria-label="日次売上グラフ"></svg>
        </div>
      </div>

      <div class="chart-block">
        <div class="chart-head">
          <h3 class="chart-title">日次件数推移</h3>
          <div class="chart-legend" id="countLegend"></div>
        </div>
        <div class="chart-wrap">
          <svg id="countChart" class="chart-svg" viewBox="0 0 960 320" preserveAspectRatio="none" aria-label="日次件数グラフ"></svg>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORE_TOKEN_KEY = 'line_summary_admin_token';
    const STORE_THEME_KEY = 'line_reservation_calendar_theme';
    const FIXED_PROJECT_URL = 'https://jhpmzqxqvapdkyvvhyra.supabase.co';
    const JST = 'Asia/Tokyo';

    const SALES_METRICS = [
      { key: 'gross_sales_yen', label: '総売上', color: getCssVar('--sales-gross') },
      { key: 'net_sales_yen', label: '純売上', color: getCssVar('--sales-net') },
      { key: 'tax_amount_yen', label: '消費税', color: getCssVar('--sales-tax') },
    ];

    const COUNT_METRICS = [
      { key: 'receipt_count', label: 'レシート件数', color: getCssVar('--count-receipt') },
      { key: 'guest_count', label: '客数', color: getCssVar('--count-guest') },
      { key: 'party_count', label: '組数', color: getCssVar('--count-party') },
    ];

    const state = {
      theme: 'dark',
      currentMonth: getCurrentMonthJst(),
      storeKey: '',
      storeOptions: [],
      selectedStoreName: '',
      totals: null,
      series: [],
      loading: false,
    };

    const dom = {
      authState: document.getElementById('authState'),
      lastRefresh: document.getElementById('lastRefresh'),
      projectUrlInput: document.getElementById('projectUrlInput'),
      tokenInput: document.getElementById('tokenInput'),
      saveTokenBtn: document.getElementById('saveTokenBtn'),
      clearTokenBtn: document.getElementById('clearTokenBtn'),
      themeToggleBtn: document.getElementById('themeToggleBtn'),
      prevMonthBtn: document.getElementById('prevMonthBtn'),
      thisMonthBtn: document.getElementById('thisMonthBtn'),
      nextMonthBtn: document.getElementById('nextMonthBtn'),
      storeSelect: document.getElementById('storeSelect'),
      reloadBtn: document.getElementById('reloadBtn'),
      summaryMeta: document.getElementById('summaryMeta'),
      summaryTitle: document.getElementById('summaryTitle'),
      summaryGrid: document.getElementById('summaryGrid'),
      salesLegend: document.getElementById('salesLegend'),
      countLegend: document.getElementById('countLegend'),
      salesChart: document.getElementById('salesChart'),
      countChart: document.getElementById('countChart'),
    };

    function getCssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function getToken() {
      return localStorage.getItem(STORE_TOKEN_KEY) || '';
    }

    function setToken(value) {
      if (value) localStorage.setItem(STORE_TOKEN_KEY, value);
      else localStorage.removeItem(STORE_TOKEN_KEY);
      updateAuthState();
    }

    function normalizeTheme(value) {
      const theme = String(value || '').trim().toLowerCase();
      return theme === 'light' ? 'light' : 'dark';
    }

    function getTheme() {
      return normalizeTheme(localStorage.getItem(STORE_THEME_KEY));
    }

    function updateThemeToggleButton() {
      const isLight = state.theme === 'light';
      dom.themeToggleBtn.textContent = isLight ? 'ダークモード' : 'ライトモード';
      dom.themeToggleBtn.setAttribute('aria-pressed', isLight ? 'true' : 'false');
      dom.themeToggleBtn.title = isLight ? 'ダークモードに切り替え' : 'ライトモードに切り替え';
    }

    function applyTheme(theme) {
      state.theme = normalizeTheme(theme);
      document.body.setAttribute('data-theme', state.theme);
      updateThemeToggleButton();
      refreshMetricColors();
      renderLegends();
      renderCharts();
    }

    function setTheme(theme) {
      const normalized = normalizeTheme(theme);
      localStorage.setItem(STORE_THEME_KEY, normalized);
      applyTheme(normalized);
    }

    function toggleTheme() {
      setTheme(state.theme === 'light' ? 'dark' : 'light');
    }

    function refreshMetricColors() {
      SALES_METRICS[0].color = getCssVar('--sales-gross');
      SALES_METRICS[1].color = getCssVar('--sales-net');
      SALES_METRICS[2].color = getCssVar('--sales-tax');
      COUNT_METRICS[0].color = getCssVar('--count-receipt');
      COUNT_METRICS[1].color = getCssVar('--count-guest');
      COUNT_METRICS[2].color = getCssVar('--count-party');
    }

    function updateAuthState() {
      const token = getToken();
      if (token) {
        dom.authState.textContent = 'トークン保存済み';
        dom.authState.classList.add('ok');
      } else {
        dom.authState.textContent = '未接続';
        dom.authState.classList.remove('ok');
      }
    }

    function getCurrentMonthJst() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat('ja-JP', { timeZone: JST, year: 'numeric', month: '2-digit' }).formatToParts(now);
      const y = parts.find((part) => part.type === 'year')?.value || String(now.getUTCFullYear());
      const m = parts.find((part) => part.type === 'month')?.value || '01';
      return y + '-' + m;
    }

    function parseMonth(month) {
      const hit = String(month || '').match(/^(\d{4})-(\d{2})$/);
      if (!hit) return null;
      return { year: Number(hit[1]), month: Number(hit[2]) };
    }

    function shiftMonth(month, delta) {
      const parsed = parseMonth(month);
      if (!parsed) return month;
      const date = new Date(Date.UTC(parsed.year, parsed.month - 1 + delta, 1));
      const y = date.getUTCFullYear();
      const m = String(date.getUTCMonth() + 1).padStart(2, '0');
      return y + '-' + m;
    }

    function formatMonthLabel(month) {
      const parsed = parseMonth(month);
      if (!parsed) return String(month || '-');
      return parsed.year + '年' + parsed.month + '月';
    }

    function formatYen(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return '¥0';
      return '¥' + Math.round(n).toLocaleString('ja-JP');
    }

    function formatCount(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return '0';
      return Math.round(n).toLocaleString('ja-JP');
    }

    function formatAverage(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '-';
      if (Math.abs(n - Math.round(n)) < 0.0001) return String(Math.round(n));
      return n.toFixed(2).replace(/\.?0+$/, '');
    }

    function formatAxisYen(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n) || n <= 0) return '0';
      if (n >= 100000000) return (n / 100000000).toFixed(1).replace(/\.0$/, '') + '億';
      if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '万';
      return Math.round(n).toLocaleString('ja-JP');
    }

    function formatDayLabel(date) {
      const hit = String(date || '').match(/^\d{4}-(\d{2})-(\d{2})$/);
      if (!hit) return String(date || '-');
      return Number(hit[1]) + '/' + Number(hit[2]);
    }

    function setLoading(loading) {
      state.loading = !!loading;
      dom.saveTokenBtn.disabled = loading;
      dom.clearTokenBtn.disabled = loading;
      dom.prevMonthBtn.disabled = loading;
      dom.thisMonthBtn.disabled = loading;
      dom.nextMonthBtn.disabled = loading;
      dom.storeSelect.disabled = loading;
      dom.reloadBtn.disabled = loading;
    }

    function renderLegends() {
      dom.salesLegend.innerHTML = SALES_METRICS.map(function(metric) {
        return '<span class="legend-item"><span class="legend-color" style="background:' + metric.color + ';"></span>' + escapeHtml(metric.label) + '</span>';
      }).join('');

      dom.countLegend.innerHTML = COUNT_METRICS.map(function(metric) {
        return '<span class="legend-item"><span class="legend-color" style="background:' + metric.color + ';"></span>' + escapeHtml(metric.label) + '</span>';
      }).join('');
    }

    function renderStoreOptions() {
      const options = Array.isArray(state.storeOptions) ? state.storeOptions : [];
      if (!options.length) {
        dom.storeSelect.innerHTML = '<option value="">店舗データなし</option>';
        dom.storeSelect.value = '';
        return;
      }
      dom.storeSelect.innerHTML = options.map(function(option) {
        const key = escapeHtml(String(option.store_key || ''));
        const name = escapeHtml(String(option.store_name || option.store_key || '不明店舗'));
        const total = formatYen(option.total_gross_sales_yen || 0);
        return '<option value="' + key + '">' + name + '（' + total + '）</option>';
      }).join('');
      dom.storeSelect.value = state.storeKey || options[0].store_key || '';
    }

    function renderSummary() {
      const totals = state.totals || {};
      const storeName = state.selectedStoreName || '店舗未選択';
      dom.summaryTitle.textContent = '店舗集計: ' + storeName;

      const items = [
        { label: '総売上合計', value: formatYen(totals.total_gross_sales_yen || 0) },
        { label: '純売上合計', value: formatYen(totals.total_net_sales_yen || 0) },
        { label: '消費税合計', value: formatYen(totals.total_tax_amount_yen || 0) },
        { label: 'レシート件数', value: formatCount(totals.receipt_count || 0) },
        { label: '客数合計', value: formatCount(totals.total_guest_count || 0) },
        { label: '組数合計', value: formatCount(totals.total_party_count || 0) },
        { label: '客単価平均', value: totals.avg_unit_price_yen == null ? '-' : formatYen(totals.avg_unit_price_yen) },
        { label: '日次売上平均', value: totals.avg_gross_sales_yen == null ? '-' : formatYen(totals.avg_gross_sales_yen) },
      ];

      dom.summaryGrid.innerHTML = items.map(function(item) {
        return '<article class="summary-item"><div class="label">' + escapeHtml(item.label) + '</div><div class="value">' + escapeHtml(item.value) + '</div></article>';
      }).join('');
    }

    function renderEmptyChart(svg, message) {
      svg.setAttribute('viewBox', '0 0 960 320');
      svg.innerHTML = '';
      const foreign = '<foreignObject x="20" y="40" width="920" height="240"><div xmlns="http://www.w3.org/1999/xhtml" class="chart-empty">' + escapeHtml(message) + '</div></foreignObject>';
      svg.insertAdjacentHTML('beforeend', foreign);
    }

    function renderLineChart(svg, metrics, axisFormatter) {
      const series = Array.isArray(state.series) ? state.series : [];
      if (!series.length) {
        renderEmptyChart(svg, '対象期間のデータがありません。');
        return;
      }

      let maxValue = 0;
      for (const row of series) {
        for (const metric of metrics) {
          const v = Number(row && row[metric.key] || 0);
          if (Number.isFinite(v) && v > maxValue) maxValue = v;
        }
      }
      if (maxValue <= 0) {
        renderEmptyChart(svg, 'データはありますが、数値が0です。');
        return;
      }

      const viewW = 960;
      const viewH = 320;
      const margin = { top: 18, right: 16, bottom: 44, left: 70 };
      const innerW = viewW - margin.left - margin.right;
      const innerH = viewH - margin.top - margin.bottom;

      const mapX = function(index) {
        if (series.length <= 1) return margin.left;
        return margin.left + (innerW * index / (series.length - 1));
      };
      const mapY = function(value) {
        const safe = Math.max(0, Number(value || 0));
        return margin.top + innerH - (safe / maxValue) * innerH;
      };

      const parts = [];
      parts.push('<rect x="0" y="0" width="960" height="320" fill="rgba(2,10,18,0.45)"></rect>');

      const yTicks = 4;
      for (let i = 0; i <= yTicks; i += 1) {
        const ratio = i / yTicks;
        const y = margin.top + innerH * ratio;
        const value = maxValue * (1 - ratio);
        parts.push('<line x1="' + margin.left.toFixed(2) + '" y1="' + y.toFixed(2) + '" x2="' + (viewW - margin.right).toFixed(2) + '" y2="' + y.toFixed(2) + '" stroke="rgba(155,220,255,0.18)" stroke-width="1"></line>');
        parts.push('<text x="' + (margin.left - 10).toFixed(2) + '" y="' + (y + 4).toFixed(2) + '" fill="rgba(184,219,238,0.85)" font-size="11" text-anchor="end">' + escapeHtml(axisFormatter(value)) + '</text>');
      }

      const dayStep = series.length > 24 ? 5 : 3;
      for (let i = 0; i < series.length; i += 1) {
        const show = i === 0 || i === series.length - 1 || ((i + 1) % dayStep === 0);
        if (!show) continue;
        const x = mapX(i);
        const label = formatDayLabel(series[i].date);
        parts.push('<line x1="' + x.toFixed(2) + '" y1="' + margin.top.toFixed(2) + '" x2="' + x.toFixed(2) + '" y2="' + (viewH - margin.bottom).toFixed(2) + '" stroke="rgba(155,220,255,0.08)" stroke-width="1"></line>');
        parts.push('<text x="' + x.toFixed(2) + '" y="' + (viewH - margin.bottom + 18).toFixed(2) + '" fill="rgba(184,219,238,0.85)" font-size="11" text-anchor="middle">' + escapeHtml(label) + '</text>');
      }

      for (const metric of metrics) {
        const points = series.map(function(row, index) {
          return {
            x: mapX(index),
            y: mapY(row[metric.key] || 0),
            raw: Number(row[metric.key] || 0),
          };
        });

        if (!points.length) continue;
        const path = points.map(function(point, index) {
          return (index === 0 ? 'M' : 'L') + point.x.toFixed(2) + ' ' + point.y.toFixed(2);
        }).join(' ');

        parts.push('<path d="' + path + '" fill="none" stroke="' + metric.color + '" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"></path>');

        if (points.length <= 40) {
          for (const point of points) {
            parts.push('<circle cx="' + point.x.toFixed(2) + '" cy="' + point.y.toFixed(2) + '" r="2.2" fill="' + metric.color + '"><title>' + escapeHtml(metric.label + ': ' + axisFormatter(point.raw)) + '</title></circle>');
          }
        }
      }

      parts.push('<line x1="' + margin.left.toFixed(2) + '" y1="' + (viewH - margin.bottom).toFixed(2) + '" x2="' + (viewW - margin.right).toFixed(2) + '" y2="' + (viewH - margin.bottom).toFixed(2) + '" stroke="rgba(155,220,255,0.45)" stroke-width="1.4"></line>');
      parts.push('<line x1="' + margin.left.toFixed(2) + '" y1="' + margin.top.toFixed(2) + '" x2="' + margin.left.toFixed(2) + '" y2="' + (viewH - margin.bottom).toFixed(2) + '" stroke="rgba(155,220,255,0.45)" stroke-width="1.4"></line>');

      svg.setAttribute('viewBox', '0 0 960 320');
      svg.innerHTML = parts.join('');
    }

    function renderCharts() {
      renderLineChart(dom.salesChart, SALES_METRICS, formatAxisYen);
      renderLineChart(dom.countChart, COUNT_METRICS, function(value) {
        return formatCount(value);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function api(path) {
      const token = getToken();
      if (!token) throw new Error('先にトークンを保存してください。');
      const url = FIXED_PROJECT_URL.replace(/\/+$/, '') + '/functions/v1/admin-api' + path;
      const res = await fetch(url, {
        headers: { 'x-admin-token': token },
        referrerPolicy: 'no-referrer',
      });
      const text = await res.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = null;
      }
      if (!res.ok) {
        const msg = data && data.error ? String(data.error) : (text || ('HTTP ' + res.status));
        throw new Error(msg);
      }
      return data || {};
    }

    async function loadSalesData() {
      if (state.loading) return;
      setLoading(true);
      try {
        const params = new URLSearchParams();
        params.set('month', state.currentMonth);
        if (state.storeKey) params.set('store_key', state.storeKey);
        const data = await api('/receipts/sales?' + params.toString());

        state.currentMonth = String(data.month || state.currentMonth);
        state.storeOptions = Array.isArray(data.store_options) ? data.store_options : [];
        state.storeKey = String(data.selected_store_key || '');
        state.selectedStoreName = String(data.selected_store_name || '');
        state.totals = data.totals || null;
        state.series = Array.isArray(data.series) ? data.series : [];

        renderStoreOptions();
        renderSummary();
        renderCharts();

        const monthLabel = formatMonthLabel(state.currentMonth);
        const storeLabel = state.selectedStoreName ? state.selectedStoreName : '店舗未選択';
        const storeCount = Number(data.available_store_count || 0);
        const rowCount = Number(data.source_row_count || 0);
        dom.summaryMeta.textContent = monthLabel + ' / ' + storeLabel + ' / 店舗数 ' + storeCount + ' / レコード ' + rowCount;
        dom.lastRefresh.textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        dom.summaryMeta.textContent = '読み込み失敗: ' + message;
        dom.summaryTitle.textContent = '店舗集計';
        dom.summaryGrid.innerHTML = '<article class="summary-item"><div class="label">エラー</div><div class="value">' + escapeHtml(message) + '</div></article>';
        renderEmptyChart(dom.salesChart, 'データ取得に失敗しました。');
        renderEmptyChart(dom.countChart, 'データ取得に失敗しました。');
      } finally {
        setLoading(false);
      }
    }

    function handleMonthChange(delta) {
      state.currentMonth = shiftMonth(state.currentMonth, delta);
      loadSalesData();
    }

    function handleStoreChange() {
      state.storeKey = String(dom.storeSelect.value || '');
      loadSalesData();
    }

    function initialize() {
      applyTheme(getTheme());
      renderLegends();
      updateAuthState();

      dom.projectUrlInput.value = FIXED_PROJECT_URL;
      dom.tokenInput.value = getToken();
      dom.summaryMeta.textContent = formatMonthLabel(state.currentMonth) + ' / 未取得';
      dom.summaryGrid.innerHTML = '';
      renderEmptyChart(dom.salesChart, '店舗を選択してデータを読み込んでください。');
      renderEmptyChart(dom.countChart, '店舗を選択してデータを読み込んでください。');

      dom.saveTokenBtn.addEventListener('click', async function() {
        const token = String(dom.tokenInput.value || '').trim();
        if (!token) {
          alert('トークンを入力してください。');
          return;
        }
        setToken(token);
        await loadSalesData();
      });

      dom.clearTokenBtn.addEventListener('click', function() {
        setToken('');
        dom.tokenInput.value = '';
        dom.summaryMeta.textContent = 'トークンを保存してください。';
      });

      dom.themeToggleBtn.addEventListener('click', function() {
        toggleTheme();
      });

      dom.prevMonthBtn.addEventListener('click', function() {
        handleMonthChange(-1);
      });

      dom.thisMonthBtn.addEventListener('click', function() {
        state.currentMonth = getCurrentMonthJst();
        loadSalesData();
      });

      dom.nextMonthBtn.addEventListener('click', function() {
        handleMonthChange(1);
      });

      dom.storeSelect.addEventListener('change', function() {
        handleStoreChange();
      });

      dom.reloadBtn.addEventListener('click', function() {
        loadSalesData();
      });

      const token = getToken();
      if (token) {
        loadSalesData();
      }
    }

    initialize();
  </script>
</body>
</html>
