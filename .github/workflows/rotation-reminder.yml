name: Monthly Rotation Reminder

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-reminder-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly key-rotation issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Monthly key rotation checklist";

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const exists = openIssues.some((issue) => issue.title === title);
            if (exists) {
              core.info("Reminder issue already exists.");
              return;
            }

            const body = [
              "## Rotation Targets",
              "- [ ] `ADMIN_DASHBOARD_TOKEN` を再発行して更新",
              "- [ ] `GROQ_API_KEY` のローテーション",
              "- [ ] `LINE_CHANNEL_ACCESS_TOKEN` のローテーション",
              "- [ ] `GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY` のローテーション",
              "",
              "## Verification",
              "- [ ] 管理画面にログインできる",
              "- [ ] LINE受信・要約返信が正常",
              "- [ ] 翌日予定通知が正常",
              "",
              "完了後はこのIssueをクローズしてください。",
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["security"],
            });
